name: City Council Agenda Summary

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC = 4 PM PST (5 PM PDT in summer)
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-run even if the agenda has not changed'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug - confirm checked-out version
        run: |
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "--- find_next_agenda_url in script ---"
          grep -A 20 "def find_next_agenda_url" city_council_agenda.py

      - name: Run agenda summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python city_council_agenda.py $FORCE

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add city-council/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update City Council agenda summary [automated]"
            git push
