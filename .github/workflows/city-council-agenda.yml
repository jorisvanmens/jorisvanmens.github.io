name: City Council Agenda Summary

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC = 4 PM PST (5 PM PDT in summer)
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-run even if the agenda has not changed'
        type: boolean
        default: false
      skip_email:
        description: 'Run the full workflow without sending an email'
        type: boolean
        default: false
      use_stored_pdf:
        description: 'Skip fetching; re-summarize from the latest saved PDF (implies force)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agenda summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}"          = "true" ]; then FLAGS="$FLAGS --force"; fi
          if [ "${{ github.event.inputs.skip_email }}"     = "true" ]; then FLAGS="$FLAGS --skip-email"; fi
          if [ "${{ github.event.inputs.use_stored_pdf }}" = "true" ]; then FLAGS="$FLAGS --use-stored-pdf"; fi
          python city_council_agenda.py $FLAGS

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add city-council/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update City Council agenda summary [automated]"
            git push
          fi
