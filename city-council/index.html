<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sausalito City Council — Agenda Summary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f5f7fa;
      color: #1a2332;
      line-height: 1.65;
    }
    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }
    .site-header {
      border-bottom: 3px solid #1d4ed8;
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }
    .site-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1d4ed8;
      letter-spacing: -0.02em;
    }
    .site-header .subtitle {
      font-size: 0.95rem;
      color: #64748b;
      margin-top: 0.2rem;
    }
    .placeholder {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 2rem;
      color: #64748b;
      text-align: center;
    }
    .placeholder p { margin: 0.5rem 0; }
    .placeholder a { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1>Sausalito City Council</h1>
      <p class="subtitle">AI-generated agenda summary &mdash; cycling, pedestrian safety &amp; housing highlights</p>
    </header>
    <div class="placeholder">
      <p><strong>No summary available yet.</strong></p>
      <p>Run <code>python city_council_agenda.py</code> to generate the first summary.</p>
      <p>Upcoming meetings: <a href="https://www.sausalito.gov/city-government/city-council/meetings-and-agendas">sausalito.gov</a></p>
    </div>
  </div>
</body>
</html>
